name: PR to main check

on:
  pull_request:
    branches:
      - main

jobs:
  pr-dev-to-main:
    name: pr-dev-to-main
    runs-on: ubuntu-latest
    steps:
      - name: Allow only PR from dev to main
        run: |
          echo "Base branch: ${{ github.event.pull_request.base.ref }}"
          echo "Head branch: ${{ github.event.pull_request.head.ref }}"

          if [ "${{ github.event.pull_request.head.ref }}" != "dev" ]; then
            echo "Only PRs from dev to main are allowed."
            exit 1
          fi

          echo "PR source branch is valid."