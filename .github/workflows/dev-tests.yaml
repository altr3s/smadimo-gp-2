name: Dev tests

on:
  pull_request:
    branches:
      - dev

jobs:
  dev-tests:
    name: dev-tests
    runs-on: ubuntu-latest

    env:
      TOKEN: ${{ secrets.TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests python-dotenv pandas

      - name: Run tests
        run: pytest test/ -v